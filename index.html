<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RR Doubling - Firebase Ready</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 15px; border-radius: 12px; }
        .summary-box { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; text-align: center; }
        .sum-card { background: #252525; padding: 8px; border-radius: 6px; }
        input, select, button { width: 100%; padding: 10px; margin: 4px 0; background: #333; color: white; border: 1px solid #555; border-radius: 6px; box-sizing: border-box; }
        .item-row { display: flex; justify-content: space-between; background: #252525; padding: 5px 10px; border-radius: 4px; margin-bottom: 4px; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        th, td { border: 1px solid #444; padding: 6px; text-align: center; }
        .del { color: #f44336; cursor: pointer; } .edit { color: #2196f3; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏭 RR Doubling</h1>
        
        <div class="summary-box">
            <div class="sum-card"><small>In</small><div id="sumIn" style="color:#4caf50; font-weight:bold;">0</div></div>
            <div class="sum-card"><small>Out</small><div id="sumOut" style="color:#f44336; font-weight:bold;">0</div></div>
            <div class="sum-card"><small>Bal</small><div id="bal" style="color:#2196f3; font-weight:bold;">0</div></div>
        </div>

        <div style="display:flex; gap:5px;">
            <input type="text" id="newItemName" placeholder="New Item Name">
            <button onclick="addNewItem()" style="width:auto;">Add</button>
        </div>
        <div id="itemsContainer" style="margin-bottom:10px;"></div>

        <input type="hidden" id="editIndex" value="-1">
        <input type="date" id="date">
        <select id="itemDropdown"><option value="">Select Item</option></select>
        <input type="number" id="qty" placeholder="Quantity">
        <select id="type"><option value="In">In</option><option value="Out">Out</option></select>
        <button id="saveBtn" onclick="saveOrUpdate()" style="background:#4caf50;">Save</button>

        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap:4px; margin:10px 0;">
            <button onclick="filter('all')">All</button>
            <button onclick="filter('today')">Day</button>
            <button onclick="filter('weekly')">Week</button>
            <button onclick="filter('monthly')">Month</button>
        </div>
        <input type="date" id="customDate" onchange="filter('custom')">

        <table id="tbl">
            <thead><tr><th>Date</th><th>Item</th><th>Qty</th><th>Type</th><th>Act</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD4ENrq0OwhD5Pr1YaUlKtskMqvmZ3FEsQ",
            authDomain: "stockdb-3bb16.firebaseapp.com",
            projectId: "stockdb-3bb16",
            storageBucket: "stockdb-3bb16.firebasestorage.app",
            messagingSenderId: "74422293265",
            appId: "1:74422293265:web:aed138404b4989e25f72b0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let records = [];
        let items = [];

        onValue(ref(db, 'rr_doubling'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                records = data.records || [];
                items = data.items || [];
                updateUI();
            }
        });

        function sync() { set(ref(db, 'rr_doubling'), { records, items }); }

        window.updateUI = function() {
            let container = document.getElementById('itemsContainer');
            container.innerHTML = '<b>Items:</b>';
            items.forEach((it, i) => {
                container.innerHTML += `<div class="item-row">${it} <span class="del" onclick="deleteItem(${i})">❌</span></div>`;
            });
            let drop = document.getElementById('itemDropdown');
            drop.innerHTML = '<option value="">Select Item</option>';
            items.forEach(it => { let o = document.createElement("option"); o.value = o.text = it; drop.add(o); });
            render(records);
        }

        window.render = function(data) {
            let tbody = document.querySelector('#tbl tbody');
            tbody.innerHTML = '';
            data.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(r => {
                let idx = records.indexOf(r);
                tbody.innerHTML += `<tr><td>${r.date}</td><td>${r.item}</td><td>${r.qty}</td><td>${r.type}</td>
                    <td><span class="edit" onclick="edit(${idx})">✏️</span> <span class="del" onclick="del(${idx})">❌</span></td></tr>`;
            });
            let inS = 0, outS = 0;
            data.forEach(r => { if(r.type === 'In') inS += parseInt(r.qty || 0); else outS += parseInt(r.qty || 0); });
            document.getElementById('sumIn').innerText = inS; document.getElementById('sumOut').innerText = outS; document.getElementById('bal').innerText = (inS - outS);
        }

        window.saveOrUpdate = function() {
            let idx = parseInt(document.getElementById('editIndex').value);
            let r = { date: document.getElementById('date').value, item: document.getElementById('itemDropdown').value, qty: document.getElementById('qty').value, type: document.getElementById('type').value };
            if(!r.date || !r.qty || !r.item) return alert("All fields required!");
            if(idx == -1) records.push(r); else records[idx] = r;
            sync();
            document.getElementById('editIndex').value = -1;
            document.getElementById('saveBtn').innerText = "Save";
        }

        window.addNewItem = function() { let name = document.getElementById('newItemName').value; if(name) { items.push(name); document.getElementById('newItemName').value = ''; sync(); } }
        window.deleteItem = function(i) { items.splice(i, 1); sync(); }
        window.edit = function(i) { let r = records[i]; document.getElementById('date').value = r.date; document.getElementById('itemDropdown').value = r.item; document.getElementById('qty').value = r.qty; document.getElementById('type').value = r.type; document.getElementById('editIndex').value = i; document.getElementById('saveBtn').innerText = "Update"; }
        window.del = function(i) { if(confirm("Delete?")) { records.splice(i, 1); sync(); } }
        
        window.filter = function(type) {
            let now = new Date();
            let filtered = records.filter(r => {
                if(type === 'all') return true;
                if(type === 'today') return r.date === now.toISOString().split('T')[0];
                if(type === 'weekly') return new Date(r.date) >= new Date(now.setDate(now.getDate() - 7));
                if(type === 'monthly') return r.date.substring(0,7) === new Date().toISOString().substring(0,7);
                if(type === 'custom') return r.date === document.getElementById('customDate').value;
            });
            render(filtered);
        }
    </script>
</body>
</html>
